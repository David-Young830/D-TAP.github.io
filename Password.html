<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D-TAP | Enterprise Auth</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #020617;
            --glass: rgba(30, 41, 59, 0.7);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
            --success: #10b981;
        }

        body {
            margin: 0; min-height: 100vh; font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.1) 0px, transparent 50%);
            display: flex; align-items: center; justify-content: center; color: var(--text-main);
        }

        .auth-container {
            width: 100%; max-width: 440px; padding: 20px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand { text-align: center; margin-bottom: 32px; }
        .brand h2 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.025em; margin: 0; }
        .brand p { color: var(--text-dim); margin-top: 8px; font-size: 0.95rem; }

        /* Social Auth */
        .social-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
        .social-btn {
            height: 48px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03); color: white; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-size: 1.25rem;
        }
        .social-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); color: var(--accent); }

        .separator { display: flex; align-items: center; margin: 24px 0; font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.1em; }
        .separator::before, .separator::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
        .separator span { padding: 0 12px; }

        /* Form Styling */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-dim); margin-bottom: 8px; }
        .input-field {
            width: 100%; height: 48px; background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            padding: 0 16px; color: white; font-size: 1rem; transition: all 0.2s; box-sizing: border-box;
        }
        .input-field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }

        /* Strength Meter */
        .strength-bar { height: 4px; background: rgba(255,255,255,0.1); margin-top: 8px; border-radius: 2px; overflow: hidden; }
        .strength-progress { height: 100%; width: 0%; transition: all 0.3s; }

        .btn-primary {
            width: 100%; height: 50px; background: var(--accent); color: white; border: none;
            border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer;
            transition: all 0.2s; margin-top: 10px;
        }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        .switch-mode { text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-dim); }
        .switch-mode span { color: var(--accent); cursor: pointer; font-weight: 600; }

        /* Toast UI */
        .toast {
            position: fixed; top: 24px; right: 24px; padding: 16px 24px; border-radius: 12px;
            background: #1e293b; border-left: 4px solid var(--accent); color: white;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); display: none; z-index: 100;
        }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="auth-container">
    <div class="glass-card">
        <div class="brand">
            <img src="D-TAP.png" alt="D-TAP logo" class="logo" style="width: 70px; margin-bottom: 12px;">
            <h2>Your Daily Needs, Your Financial Bridge.</h2>
            <p id="brand-sub">Secure D-TAP Access</p>
        </div>

        <div class="social-row flex space-x-4">
            <a href="https://accounts.google.com/v3/signin/identifier?continue=https%3A%2F%2Fwww.google.com%3Fhl%3Den-GB&ec=GAlA8wE&hl=en-GB&flowName=GlifWebSignIn&flowEntry=AddSession&dsh=S1208995347%3A1777465843055141" target="_blank" rel="noopener noreferrer" class="social-btn" title="Google">
                <i class="ph-bold ph-google-logo"></i>
            </a>

            <a href="https://linkedin.com/login" target="_blank" rel="noopener noreferrer" class="social-btn" title="LinkedIn">
                <i class="ph-bold ph-linkedin-logo"></i>
            </a>

            <a href="https://facebook.com/login" target="_blank" rel="noopener noreferrer" class="social-btn" title="Facebook">
                <i class="ph-bold ph-facebook-logo"></i>
            </a>
        </div>

        <div class="separator"><span>or continue with email</span></div>

        <form id="authForm">
            <div id="nameGroup" class="input-group" style="display: none;">
                <label>Full Name</label>
                <input type="text" id="fullName" class="input-field" placeholder="Enter your name">
            </div>
            
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" class="input-field" placeholder="name@company.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                <div id="strengthMeter" class="strength-bar" style="display: none;">
                    <div id="strengthProgress" class="strength-progress"></div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary">Sign In</button>
        </form>

        <div class="switch-mode" id="modeToggle">
            Don't have an account? <span onclick="authManager.toggleMode()">Create Account</span>
        </div>
    </div>
</div>

<script>
  /**
 * AuthManager Class
 * Handles all authentication logic, session management, and UI state
 */
class AuthManager {
    constructor() {
        this.isLoginMode = true;
        this.form = document.getElementById('authForm');
        this.db = JSON.parse(localStorage.getItem('dtap_users')) || [];
        this.init();
    }

    init() {
        this.form.addEventListener('submit', (e) => this.handleSubmit(e));
        document.getElementById('password').addEventListener('input', (e) => this.checkPasswordStrength(e.target.value));
    }

    showToast(msg, type = 'accent') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.borderColor = `var(--${type})`;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    toggleMode() {
        this.isLoginMode = !this.isLoginMode;
        const nameGroup = document.getElementById('nameGroup');
        const submitBtn = document.getElementById('submitBtn');
        const modeToggle = document.getElementById('modeToggle');
        const strengthMeter = document.getElementById('strengthMeter');

        if (this.isLoginMode) {
            nameGroup.style.display = 'none';
            strengthMeter.style.display = 'none';
            submitBtn.textContent = 'Sign In';
            modeToggle.innerHTML = "Don't have an account? <span onclick='authManager.toggleMode()'>Create Account</span>";
        } else {
            nameGroup.style.display = 'block';
            strengthMeter.style.display = 'block';
            submitBtn.textContent = 'Get Started';
            modeToggle.innerHTML = "Already a member? <span onclick='authManager.toggleMode()'>Sign In</span>";
        }
    }

    checkPasswordStrength(pass) {
        if (this.isLoginMode) return;
        const progress = document.getElementById('strengthProgress');
        let score = 0;
        if (pass.length > 6) score++;
        if (/[A-Z]/.test(pass)) score++;
        if (/[0-9]/.test(pass)) score++;
        if (/[^A-Za-z0-9]/.test(pass)) score++;

        const colors = ['#ef4444', '#f59e0b', '#3b82f6', '#10b981'];
        progress.style.width = (score * 25) + '%';
        progress.style.backgroundColor = colors[score - 1] || '#334155';
    }

    async handleSubmit(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = document.getElementById('submitBtn');
        
        // UI Feedback: Disable button during "Network Request"
        submitBtn.disabled = true;
        submitBtn.textContent = 'Authenticating...';

        // Artificial delay for professional feel
        await new Promise(res => setTimeout(res, 1200));

        if (this.isLoginMode) {
            const user = this.db.find(u => u.email === email && u.password === password);
            if (user) {
                this.showToast(`Welcome back, ${user.name}! Redirecting...`, 'success');
                sessionStorage.setItem('active_user', JSON.stringify(user));
                
                // REDIRECT TO HOME PAGE AFTER 1.5 SECONDS
                setTimeout(() => {
                    window.location.href = 'Swifthub.html';
                }, 1500);
            } else {
                this.showToast('Invalid credentials provided.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        } else {
            const name = document.getElementById('fullName').value;
            if (this.db.find(u => u.email === email)) {
                this.showToast('Email already registered.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Get Started';
            } else {
                const newUser = { name, email, password };
                this.db.push(newUser);
                localStorage.setItem('dtap_users', JSON.stringify(this.db));
                sessionStorage.setItem('active_user', JSON.stringify(newUser)); // Auto-login
                
                this.showToast('Account created! Welcome to D-TAP.', 'success');
                
                // REDIRECT TO HOME PAGE AFTER 2 SECONDS
                setTimeout(() => {
                    window.location.href = 'swifthub.html';
                }, 2000);
            }
        }
    }
}

// Initialize Global Auth
const authManager = new AuthManager();
</script>
</body>
</html>
